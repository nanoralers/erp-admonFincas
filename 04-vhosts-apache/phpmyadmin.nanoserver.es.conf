# ════════════════════════════════════════════════════════════════════════════
#  phpmyadmin.nanoserver.es — VirtualHost Apache
#  phpMyAdmin 5.2.3 · Debian 13 Trixie
#
#  Instalado en: /etc/apache2/sites-available/phpmyadmin.nanoserver.es.conf
#  Habilitar con: sudo a2ensite phpmyadmin.nanoserver.es.conf
# ════════════════════════════════════════════════════════════════════════════


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  HTTP → HTTPS (redirección)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:80>
    ServerName phpmyadmin.nanoserver.es

    LogLevel warn
    ErrorLog  /home/nano/www/logs/phpmyadmin-error.log
    CustomLog /home/nano/www/logs/phpmyadmin-access.log combined

    # Redirigir todo a HTTPS
    RewriteEngine on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  HTTPS — phpMyAdmin
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:443>
    ServerName phpmyadmin.nanoserver.es
    ServerAdmin admin@nanoserver.es

    # phpMyAdmin se instala en /usr/share/phpmyadmin con apt en Debian
    DocumentRoot /usr/share/phpmyadmin

    # ── Directorio principal phpMyAdmin ──────────────────────────────────────
    <Directory /usr/share/phpmyadmin>
        Options SymLinksIfOwnerMatch
        DirectoryIndex index.php
        AllowOverride All
        Require all granted

        # PHP: rutas permitidas (open_basedir)
        <IfModule mod_php.c>
            php_admin_value upload_tmp_dir    /var/lib/phpmyadmin/tmp
            php_admin_value open_basedir      /usr/share/phpmyadmin/:/etc/phpmyadmin/:/var/lib/phpmyadmin/:/usr/share/php/
            php_admin_value session.gc_maxlifetime 1440
        </IfModule>
    </Directory>

    # ── Bloquear acceso a archivos sensibles de phpMyAdmin ───────────────────
    <Directory /usr/share/phpmyadmin/setup>
        # El script setup solo necesario en instalación — bloqueado en producción
        Require all denied
    </Directory>
    <Directory /usr/share/phpmyadmin/libraries>
        Require all denied
    </Directory>
    <Directory /usr/share/phpmyadmin/templates>
        Require all denied
    </Directory>

    # ── Bloquear archivos sensibles ───────────────────────────────────────────
    <FilesMatch "(README|RELEASE-DATE|phpinfo\.php|\.git)">
        Require all denied
    </FilesMatch>

    # ── Incluir configuración adicional de phpMyAdmin (si existe) ─────────────
    # El paquete Debian instala su propia configuración de Apache
    <IfFile /etc/phpmyadmin/apache.conf>
        Include /etc/phpmyadmin/apache.conf
    </IfFile>

    # ── Seguridad adicional: limitar acceso por IP (OPCIONAL) ─────────────────
    # Descomentar para restringir phpMyAdmin solo a la red local
    # <Location "/">
    #     # Permitir solo desde la red interna y localhost
    #     Require ip 127.0.0.1
    #     Require ip 192.168.1.0/24
    # </Location>

    # ── Rate limiting básico para el login ────────────────────────────────────
    # (requiere mod_ratelimit, puede no estar disponible en todas las instalaciones)
    # <Location "/index.php">
    #     <IfModule mod_ratelimit.c>
    #         SetOutputFilter RATE_LIMIT
    #         SetEnv rate-limit 200
    #     </IfModule>
    # </Location>

    # ── Headers de seguridad específicos para phpMyAdmin ─────────────────────
    <IfModule mod_headers.c>
        Header always set X-Frame-Options         "DENY"
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "no-referrer"
        # CSP estricto para phpMyAdmin
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:"
        # HSTS para este subdominio
        Header always set Strict-Transport-Security "max-age=31536000"
    </IfModule>

    # ── Logs separados para phpMyAdmin ────────────────────────────────────────
    LogLevel warn
    ErrorLog  /home/nano/www/logs/phpmyadmin-error.log
    CustomLog /home/nano/www/logs/phpmyadmin-access.log combined

    # ── SSL — Certificado wildcard *.nanoserver.es ────────────────────────────
    SSLEngine on
    Include                  /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile       /etc/letsencrypt/live/nanoserver.es-wildcard/fullchain.pem
    SSLCertificateKeyFile    /etc/letsencrypt/live/nanoserver.es-wildcard/privkey.pem

</VirtualHost>
