# ════════════════════════════════════════════════════════════════════════════
#  nanoserver_es.conf — VirtualHosts principales
#  Apache 2.4 · Debian 13 Trixie · PHP 8.4 · MariaDB 11.8
#
#  Instalar en: /etc/apache2/sites-available/nanoserver_es.conf
#  Habilitar:   sudo a2ensite nanoserver_es.conf
#
#  Cubre:
#    nanoserver.es / www.nanoserver.es → Sitio principal
#    *.nanoserver.es                   → ERP Fincas (tenant por subdominio)
#    admin.nanoserver.es               → Panel superadministrador ERP
#
#  El VirtualHost de phpmyadmin está en su propio archivo:
#    /etc/apache2/sites-available/phpmyadmin.nanoserver.es.conf
# ════════════════════════════════════════════════════════════════════════════


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 1 — HTTP → HTTPS (todos los dominios y subdominios)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:80>
    ServerName  nanoserver.es
    ServerAlias www.nanoserver.es *.nanoserver.es

    ServerAdmin admin@nanoserver.es
    DocumentRoot /home/nano/www/html

    LogLevel warn
    ErrorLog  /home/nano/www/logs/error.log
    CustomLog /home/nano/www/logs/access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} ^.*\.nanoserver\.es$ [OR]
    RewriteCond %{SERVER_NAME} =nanoserver.es
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 2 — HTTPS: Sitio principal (nanoserver.es / www.nanoserver.es)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:443>
    ServerName  nanoserver.es
    ServerAlias www.nanoserver.es

    ServerAdmin admin@nanoserver.es
    DocumentRoot /home/nano/www/html

    <Directory /home/nano/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    LogLevel warn
    ErrorLog  /home/nano/www/logs/error.log
    CustomLog /home/nano/www/logs/access.log combined

    SSLEngine on
    Include                  /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile       /etc/letsencrypt/live/nanoserver.es/fullchain.pem
    SSLCertificateKeyFile    /etc/letsencrypt/live/nanoserver.es/privkey.pem
</VirtualHost>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 3 — HTTPS: ERP Fincas (admin + *.nanoserver.es)
#
#  Apache resuelve phpmyadmin.nanoserver.es por su VirtualHost específico
#  antes de llegar aquí gracias al ServerName más específico.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:443>
    ServerName  erp.nanoserver.es
    ServerAlias admin.nanoserver.es *.nanoserver.es

    ServerAdmin admin@nanoserver.es
    DocumentRoot /home/nano/www/erp-fincas/public

    <Directory /home/nano/www/erp-fincas/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        <IfModule mod_php.c>
            php_admin_value open_basedir   "/home/nano/www/erp-fincas/:/home/nano/www/logs/:/tmp/"
            php_admin_value upload_tmp_dir "/home/nano/www/erp-fincas/uploads/"
        </IfModule>
    </Directory>

    # Denegar acceso a directorios internos del ERP
    <Directory /home/nano/www/erp-fincas/config>
        Require all denied
    </Directory>
    <Directory /home/nano/www/erp-fincas/core>
        Require all denied
    </Directory>
    <Directory /home/nano/www/erp-fincas/install>
        Require all denied
    </Directory>

    <FilesMatch "(^\.env|\.sql$|composer\.(json|lock)$)">
        Require all denied
    </FilesMatch>

    LogLevel warn
    ErrorLog  /home/nano/www/logs/erp-error.log
    CustomLog /home/nano/www/logs/erp-access.log combined

    SSLEngine on
    Include                  /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile       /etc/letsencrypt/live/nanoserver.es-wildcard/fullchain.pem
    SSLCertificateKeyFile    /etc/letsencrypt/live/nanoserver.es-wildcard/privkey.pem
</VirtualHost>
