# ════════════════════════════════════════════════════════════════════════════
#  nanoserver_es.conf — VirtualHost configuration for nanoserver.es
#  Incluye soporte para ERP Fincas con subdominios wildcard *.nanoserver.es
#
#  Ruta de instalación del ERP:  /home/nano/www/erp-fincas/
#  Document root del ERP:        /home/nano/www/erp-fincas/public/
#  Ruta del site principal:      /home/nano/www/html/
# ════════════════════════════════════════════════════════════════════════════


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 1 – HTTP → HTTPS (redirección global para todos los subdominios)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:80>
    ServerName  nanoserver.es
    ServerAlias www.nanoserver.es *.nanoserver.es

    ServerAdmin admin@nanoserver.es
    DocumentRoot /home/nano/www/html

    LogLevel warn
    ErrorLog  /home/nano/www/logs/error.log
    CustomLog /home/nano/www/logs/access.log combined

    # Redirigir TODO (dominio raíz + cualquier subdominio) a HTTPS
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =www.nanoserver.es [OR]
    RewriteCond %{SERVER_NAME} =nanoserver.es      [OR]
    RewriteCond %{SERVER_NAME} =admin.nanoserver.es [OR]
    RewriteCond %{SERVER_NAME} ^[^.]+\.nanoserver\.es$
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 2 – HTTPS: Sitio principal  (nanoserver.es / www.nanoserver.es)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:443>
    ServerName  nanoserver.es
    ServerAlias www.nanoserver.es

    ServerAdmin admin@nanoserver.es
    DocumentRoot /home/nano/www/html

    <Directory /home/nano/www/html>
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    LogLevel warn
    ErrorLog  /home/nano/www/logs/error.log
    CustomLog /home/nano/www/logs/access.log combined

    # ── SSL (certificado existente nanoserver.es) ──────────────────────────
    SSLEngine on
    Include                  /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile       /etc/letsencrypt/live/nanoserver.es/fullchain.pem
    SSLCertificateKeyFile    /etc/letsencrypt/live/nanoserver.es/privkey.pem
</VirtualHost>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BLOQUE 3 – HTTPS: ERP FINCAS  (*.nanoserver.es)
#
#  Cubre:
#    admin.nanoserver.es           → Panel superadministrador
#    nombregestoria.nanoserver.es  → App de cada gestora (tenant)
#
#  IMPORTANTE: Requiere certificado wildcard. Ver sección SSL más abajo.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
<VirtualHost *:443>
    ServerName  erp.nanoserver.es
    ServerAlias admin.nanoserver.es *.nanoserver.es

    ServerAdmin admin@nanoserver.es

    # ── Raíz pública del ERP ───────────────────────────────────────────────
    DocumentRoot /home/nano/www/erp-fincas/public

    <Directory /home/nano/www/erp-fincas/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Denegar acceso directo a directorios sensibles del proyecto
    <Directory /home/nano/www/erp-fincas/config>
        Require all denied
    </Directory>
    <Directory /home/nano/www/erp-fincas/core>
        Require all denied
    </Directory>
    <Directory /home/nano/www/erp-fincas/install>
        Require all denied
    </Directory>

    # ── PHP variables de entorno (cargadas desde .env del proyecto) ────────
    # Alternativa a .env si prefieres definir aquí las vars de entorno:
    # SetEnv APP_ENV      production
    # SetEnv APP_DEBUG    false
    # SetEnv BASE_DOMAIN  nanoserver.es
    # SetEnv DB_HOST      localhost
    # SetEnv DB_NAME      erp_fincas
    # SetEnv DB_USER      erp_user
    # SetEnv DB_PASS      TU_PASSWORD_AQUI

    # ── Logs separados para el ERP ─────────────────────────────────────────
    LogLevel warn
    ErrorLog  /home/nano/www/logs/erp-error.log
    CustomLog /home/nano/www/logs/erp-access.log combined

    # ── SSL: Certificado WILDCARD *.nanoserver.es ──────────────────────────
    # NOTA: Ver instrucciones en el archivo INSTRUCCIONES-SSL-WILDCARD.md
    # para obtener este certificado si aún no lo tienes.
    SSLEngine on
    Include                  /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile       /etc/letsencrypt/live/nanoserver.es-wildcard/fullchain.pem
    SSLCertificateKeyFile    /etc/letsencrypt/live/nanoserver.es-wildcard/privkey.pem
</VirtualHost>
